<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico Interativo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="quiz-container">
        <!-- Tela Inicial -->
        <div id="start-screen" class="screen active">
            <h1>📖 Quiz Bíblico</h1>
            <p>Teste seus conhecimentos sobre as Escrituras!</p>
            <div class="category-select">
                <label for="category">Escolha o tema:</label>
                <select id="category">
                    <option value="geral">Geral</option>
                    <option value="antigo">Antigo Testamento</option>
                    <option value="novo">Novo Testamento</option>
                    <option value="personagens">Personagens</option>
                </select>
            </div>
            <button id="start-btn" class="btn-primary">Começar Quiz</button>
        </div>

        <!-- Tela do Quiz -->
        <div id="quiz-screen" class="screen">
            <div class="header">
                <span id="question-count">Questão 1 de 10</span>
                <span id="score-display">Pontos: 0</span>
            </div>
            
            <div class="question-box">
                <h2 id="question-text">Carregando pergunta...</h2>
            </div>

            <div id="answer-buttons" class="btn-grid">
                <!-- Botões gerados via JS -->
            </div>

            <button id="next-btn" class="btn-primary next-btn">Próxima Pergunta</button>
        </div>

        <!-- Tela de Resultado -->
        <div id="result-screen" class="screen">
            <h2>Quiz Finalizado! 🎉</h2>
            <div class="result-circle">
                <span id="final-score">0</span>
                <small>de <span id="total-questions">0</span></small>
            </div>
            <p id="result-message">Mensagem de resultado</p>
            <button id="restart-btn" class="btn-primary">Jogar Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
